<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineScope</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <!-- ── Navigation ─────────────────────────────────────────── -->
  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="#home" class="nav-logo">Cine<span>Scope</span></a>

      <div class="nav-links" id="nav-links">
        <a href="#home"   class="nav-link" data-route="home">Home</a>
        <a href="#search" class="nav-link" data-route="search">Search</a>
        <a href="#lists"  class="nav-link nav-link--auth" data-route="lists" id="nav-lists">My Lists</a>
        <button class="nav-link nav-btn" id="nav-auth-btn">Sign In</button>
      </div>

      <div class="nav-search">
        <input
          type="text"
          id="nav-search-input"
          class="nav-search-input"
          placeholder="Search movies…"
          autocomplete="off"
        />
        <button class="nav-search-btn" id="nav-search-btn" aria-label="Search">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
      </div>

      <button class="nav-hamburger" id="nav-hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- ── App Root ────────────────────────────────────────────── -->
  <main id="app">
    <div class="spinner-fullpage" id="initial-spinner">
      <div class="spinner"></div>
    </div>
  </main>

  <!-- ── Actor Modal ─────────────────────────────────────────── -->
  <div class="modal-backdrop" id="actor-modal" aria-modal="true" role="dialog" hidden>
    <div class="modal-box" id="actor-modal-box">
      <button class="modal-close" id="actor-modal-close" aria-label="Close">&times;</button>
      <div id="actor-modal-content"></div>
    </div>
  </div>

  <!-- ── Auth Modal ──────────────────────────────────────────── -->
  <div class="modal-backdrop" id="auth-modal" aria-modal="true" role="dialog" hidden>
    <div class="modal-box modal-box--auth" id="auth-modal-box">
      <button class="modal-close" id="auth-modal-close" aria-label="Close">&times;</button>
      <div id="auth-modal-content"></div>
    </div>
  </div>

  <!-- ── Toast ───────────────────────────────────────────────── -->
  <div class="toast" id="toast" aria-live="polite"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
